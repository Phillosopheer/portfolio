<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="play control icon">
  <defs>
    <linearGradient id="stroke" x1="54" y1="52" x2="203" y2="205" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#43f5ff"/>
      <stop offset="1" stop-color="#37ffb5"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="62%">
      <stop offset="0" stop-color="#43f5ff" stop-opacity=".28"/>
      <stop offset=".7" stop-color="#37ffb5" stop-opacity=".08"/>
      <stop offset="1" stop-color="#37ffb5" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="15" stdDeviation="13" flood-color="#000000" flood-opacity=".45"/>
    </filter>
    <filter id="softGlow" x="-55%" y="-55%" width="210%" height="210%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
