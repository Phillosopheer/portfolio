  <circle cx="128" cy="128" r="74" fill="none" stroke="url(#stroke)" stroke-opacity=".22" stroke-width="2"/>
  <circle cx="128" cy="128" r="54" fill="#071018" fill-opacity=".55" stroke="url(#stroke)" stroke-opacity=".75" stroke-width="3"/>
  <g filter="url(#softGlow)">
    <path class="glyph" d="M108 88v80c0 8 8.7 13 15.6 8.7l64-40c6.4-4 6.4-13.4 0-17.4l-64-40C116.7 75 108 80 108 88Z"/>
