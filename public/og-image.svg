<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#15ef8d" stroke-width="0.15" opacity="0.25"/>
  </pattern>
</defs>

<!-- Background -->
<rect width="1200" height="630" fill="#090c10"/>
<rect width="1200" height="630" fill="url(#grid)"/>
<rect width="1200" height="630" fill="#090c10" opacity="0.35"/>

<!-- Terminal lines left -->
<g opacity="0.18" font-family="monospace" font-size="11" fill="#15ef8d">
  <text x="40" y="60">root@nodo:~$ ./portfolio --start</text>
  <text x="40" y="80">[ OK ] Loading modules...</text>
  <text x="40" y="100">[ OK ] Web development    ████████ 100%</text>
  <text x="40" y="120">[ OK ] Android apps       ████████ 100%</text>
  <text x="40" y="140">[ OK ] Desktop software   ████████ 100%</text>
  <text x="40" y="160">[ OK ] Security tools     ██████░░  85%</text>
  <text x="40" y="180">[ .. ] Connecting...</text>
  <text x="40" y="200">Press d to enable detailed statistics</text>
  <text x="40" y="220">Press i for additional info</text>
</g>

<!-- Terminal lines right -->
<g opacity="0.12" font-family="monospace" font-size="10" fill="#15ef8d">
  <text x="850" y="50">$ netstat -an | grep LISTEN</text>
  <text x="850" y="66">tcp  0.0.0.0:443   LISTEN</text>
  <text x="850" y="82">tcp  0.0.0.0:80    LISTEN</text>
  <text x="850" y="98">tcp  0.0.0.0:3000  LISTEN</text>
  <text x="850" y="114">tcp  0.0.0.0:5432  LISTEN</text>
  <text x="850" y="130">$ uptime</text>
  <text x="850" y="146">up 847 days, 12:34</text>
  <text x="850" y="162">load avg: 0.12 0.08 0.05</text>
  <text x="850" y="178">$ whoami</text>
  <text x="850" y="194">nodo</text>
</g>

<!-- Horizontal accent lines -->
<line x1="40" y1="270" x2="440" y2="270" stroke="#15ef8d" stroke-width="0.5" opacity="0.4"/>
<line x1="760" y1="270" x2="1160" y2="270" stroke="#15ef8d" stroke-width="0.5" opacity="0.4"/>
<line x1="40" y1="372" x2="440" y2="372" stroke="#15ef8d" stroke-width="0.5" opacity="0.4"/>
<line x1="760" y1="372" x2="1160" y2="372" stroke="#15ef8d" stroke-width="0.5" opacity="0.4"/>

<!-- Bracket decorations -->
<text x="460" y="278" font-family="monospace" font-size="14" fill="#15ef8d" opacity="0.5">[</text>
<text x="726" y="278" font-family="monospace" font-size="14" fill="#15ef8d" opacity="0.5">]</text>
<text x="460" y="375" font-family="monospace" font-size="14" fill="#15ef8d" opacity="0.5">[</text>
<text x="726" y="375" font-family="monospace" font-size="14" fill="#15ef8d" opacity="0.5">]</text>

<!-- Main title -->
<text x="600" y="300" text-anchor="middle" font-family="monospace" font-size="58" font-weight="700" fill="#ffffff" letter-spacing="6">დეველოპერი</text>

<!-- Cursor -->
<rect x="839" y="265" width="5" height="40" fill="#15ef8d" opacity="0.9"/>

<!-- Subtitle -->
<text x="600" y="350" text-anchor="middle" font-family="monospace" font-size="18" fill="#15ef8d" letter-spacing="2" opacity="0.9">Nodo Kebadze · Software Engineer</text>

<!-- Tag line -->
<text x="600" y="395" text-anchor="middle" font-family="monospace" font-size="13" fill="#9ef7ca" letter-spacing="1" opacity="0.65">Web · Android · Desktop · Security</text>

<!-- URL badge -->
<rect x="490" y="440" width="220" height="32" rx="4" fill="#15ef8d" fill-opacity="0.12" stroke="#15ef8d" stroke-width="0.8" stroke-opacity="0.4"/>
<text x="600" y="461" text-anchor="middle" font-family="monospace" font-size="13" fill="#15ef8d" opacity="0.8">nodokebadze.vercel.app</text>

<!-- Corner decorations -->
<g opacity="0.35" stroke="#15ef8d" stroke-width="1.2" fill="none">
  <path d="M 30 30 L 30 60 L 60 60"/>
  <path d="M 1170 30 L 1170 60 L 1140 60"/>
  <path d="M 30 600 L 30 570 L 60 570"/>
  <path d="M 1170 600 L 1170 570 L 1140 570"/>
</g>
</svg>
